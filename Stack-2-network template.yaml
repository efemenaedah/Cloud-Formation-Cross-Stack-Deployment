AWSTemplateFormatVersion: "2010-09-09"
Description: Deploy EC2 and Import variable from network template

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 Key Pair

  InstanceTypeParam:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t2.micro
      - t3.micro
      - t3.small
    Description: EC2 instance type

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-east-2:
      AMI: ami-00399ec92321828f5
    us-west-2:
      AMI: ami-075b5421f670d735c

Resources:
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceTypeParam
      ImageId: !FindInMap [RegionMap, !Ref "AWS::Region", AMI]
      KeyName: !Ref KeyPairName
      SubnetId: !ImportValue SampleNetworkCrossStack-Subnet
      SecurityGroupIds:
        - !ImportValue SampleNetworkCrossStack-SG

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  PublicIP:
    Description: "The public IP address of the EC2 instance"
    Value: !GetAtt EC2Instance.PublicIp

  InstancePublicDNS:
    Description: "Public DNS name of the newly created EC2 instance"
    Value: !GetAtt EC2Instance.PublicDnsName
